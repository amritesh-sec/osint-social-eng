<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% seo %}
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/osint-social-eng/assets/css/main.css' | absolute_url }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}" />
  <link rel="icon" type="image/svg+xml" href="{{ '/osint-social-eng/assets/images/favicon.svg' | absolute_url }}" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Amritesh",
    "url": "{{ site.parent_site.url }}",
    "sameAs": ["https://github.com/amritesh-sec"],
    "jobTitle": "Cybersecurity Researcher & Advisor"
  }
  </script>

  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title }}",
    "author": { "@type": "Person", "name": "{{ page.author | default: site.author }}" },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "description": "{{ page.description | default: page.excerpt }}",
    "url": "{{ page.url | absolute_url }}"
  }
  </script>
  {% endif %}
</head>
<body>
  {% include nav.html %}
  <main>{{ content }}</main>
  {% include footer.html %}
  <script src="{{ '/osint-social-eng/assets/js/main.js' | absolute_url }}"></script>
</body>
</html>
